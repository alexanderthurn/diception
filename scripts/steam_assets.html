                for (let col = 0; col < totalCols; col++) {
                    if (holeSet.has(`${col},${row}`)) {
                        grid[row].push(null);
                        continue;
                    }
                    // Jittered Voronoi: nearest seed wins
                    const jx = mapRng() * 3 - 1.5;
                    const jy = mapRng() * 3 - 1.5;
                    let best = 0, bestDist = Infinity;
                    for (let s = 0; s < seeds.length; s++) {
                        const d = (col + jx - seeds[s].x) ** 2 + (row + jy - seeds[s].y) ** 2;
                        if (d < bestDist) { bestDist = d; best = s; }
                    }
                    grid[row].push({ color: seeds[best].color, dice: 1 + Math.floor(mapRng() * 6) });
                }
            }

            // Draw tiles
            for (let row = 0; row < totalRows; row++) {
                for (let col = 0; col < totalCols; col++) {
                    const cell = grid[row][col];
                    if (!cell) continue;
                    const { color, dice } = cell;
                    const tx = offX + col * tileSize;
                    const ty = offY + row * tileSize;

                    // Fill
                    ctx.shadowColor = color;
                    ctx.shadowBlur = tileSize * 0.35;
                    ctx.fillStyle = color;
                    ctx.globalAlpha = 0.50;
                    ctx.fillRect(tx, ty, tileSize, tileSize);
                    ctx.shadowBlur = 0;

                    // Borders: draw on edges facing a different color or a hole
                    ctx.globalAlpha = 0.90;
                    ctx.strokeStyle = color;
                    for (const [dx, dy, x1, y1, x2, y2] of [
                        [ 0, -1, tx,            ty,            tx + tileSize, ty           ],
                        [ 0,  1, tx,            ty + tileSize, tx + tileSize, ty + tileSize],
                        [-1,  0, tx,            ty,            tx,            ty + tileSize],
                        [ 1,  0, tx + tileSize, ty,            tx + tileSize, ty + tileSize],
                    ]) {
                        const nc = col + dx, nr = row + dy;
                        const nb = (nr >= 0 && nr < totalRows && nc >= 0 && nc < totalCols)
                            ? grid[nr][nc] : null;
                        if (!nb || nb.color !== color) {
                            // Thicker border on letter-hole edges so the letter outline glows
                            const isHoleEdge = !nb || nb === null;
                            ctx.lineWidth = isHoleEdge
                                ? Math.max(4, tileSize * 0.10)
                                : Math.max(1, tileSize * 0.03);
                            ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
                        }
                    }

                    // Dice sprites
                    ctx.globalAlpha = 0.80;
                    const sf = tileSize / 60;
                    const positions = SPRITE_PATTERNS[Math.min(dice, 9)] || SPRITE_PATTERNS[9];
                    const spacing = 13 * sf;
                    const spriteSize = 0.06 * sf * DICE_SPRITE.w;
                    const cx = tx + tileSize / 2, cy = ty + tileSize / 2;
                    for (const [px, py] of positions) {
                        ctx.drawImage(spriteSheet,
                            DICE_SPRITE.x, DICE_SPRITE.y, DICE_SPRITE.w, DICE_SPRITE.h,
                            cx + px * spacing - spriteSize / 2,
                            cy + py * spacing - spriteSize / 2,
                            spriteSize, spriteSize);
                    }
                }
            }

            ctx.globalAlpha = 1;
            ctx.shadowBlur = 0;
        }

        // ── Community post renderer (800×450) ──
        // Shared layout: left 40% = brand zone, right 60% = battle map.
        // asset.label and asset.accentColor drive the type-specific visuals.
        function drawCommunityPost(canvas, asset) {
            const ctx = canvas.getContext('2d');
            const w = asset.w, h = asset.h;
            const label = asset.label || 'NEWS';
            const accent = asset.accentColor || '#00FFFF';

            // Each type gets its own RNG seed so maps/dice look different
            const seed = asset.id.split('').reduce((a, c) => a + c.charCodeAt(0), 0);
            const rng = mulberry32(asset.w * 1337 + asset.h * 31 + PAGE_SEED + seed);

            // Stars + grid + nebula
            drawShaderBackground(ctx, w, h, 6.0 + seed % 12, null, 2.0);

            // Floating dice — spread across the full canvas, faded
            drawFloatingDice(ctx, w, h, rng, 1.4, null, 28, 55, 0.65);
            drawParticles(ctx, w, h, 45, rng);

            // ── Layout: left 40% = brand zone, right 60% = map zone ──
            const splitX = Math.round(w * 0.40);

            // Dark vignette over left zone for text readability
            const leftFade = ctx.createLinearGradient(0, 0, splitX * 1.4, 0);
            leftFade.addColorStop(0,    'rgba(5,5,18,0.94)');
            leftFade.addColorStop(0.70, 'rgba(5,5,18,0.72)');
            leftFade.addColorStop(1,    'rgba(5,5,18,0)');
            ctx.fillStyle = leftFade;
            ctx.fillRect(0, 0, splitX * 1.4, h);

            // ── Battle map — fills right half edge-to-edge ──
            const mapRng = mulberry32(w * 61 + h * 19 + seed);
            const cols = 8, rows = 6;
            // Size tiles so the grid exactly fills the right half (w/2 → w) × (0 → h)
            const mapHalfW = w - splitX;
            const tileSize = Math.floor(Math.min(mapHalfW / cols, h / rows));
            const gap = Math.max(1, Math.round(tileSize * 0.04));
            const mapW2 = cols * (tileSize + gap) - gap;
            const mapH2 = rows * (tileSize + gap) - gap;
            // Center within right half, then nudge so tiles bleed to all four edges
            const mapX = splitX + (mapHalfW - mapW2) / 2;
            const mapY = (h - mapH2) / 2;

            // Rotate the color list per type so each post has a different dominant palette
            const rotated = [...PLAYER_COLORS].slice(seed % PLAYER_COLORS.length)
                .concat([...PLAYER_COLORS].slice(0, seed % PLAYER_COLORS.length));
            const mapColors = rotated.slice(0, 4);
            const battleMap = generateBattleMap(cols, rows, mapColors, mapRng);

            ctx.save();
            ctx.beginPath();
            ctx.rect(splitX, 0, w - splitX, h);
            ctx.clip();
            drawMiniMap(ctx, battleMap, mapX, mapY, tileSize, gap);
            ctx.restore();

            // Left fade: map bleeds from splitX, fades into background over ~35% of canvas width
            const leftMapFade = ctx.createLinearGradient(splitX, 0, splitX + w * 0.35, 0);
            leftMapFade.addColorStop(0, 'rgba(5,5,18,0.92)');
            leftMapFade.addColorStop(1, 'rgba(5,5,18,0)');
            ctx.fillStyle = leftMapFade;
            ctx.fillRect(splitX, 0, w * 0.35, h);

            // Right + top + bottom edge vignette so map bleeds cleanly to corners
            const edgeFade = ctx.createLinearGradient(w * 0.80, 0, w, 0);
            edgeFade.addColorStop(0, 'rgba(5,5,18,0)');
            edgeFade.addColorStop(1, 'rgba(5,5,18,0.50)');
            ctx.fillStyle = edgeFade;
            ctx.fillRect(0, 0, w, h);

            // ── Texts (drawn after map so they sit on top) ──
            const titleCX = splitX * 0.72;
            const maxLabelW = splitX * 0.85;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'alphabetic';

            // Ghost watermark — first word of label, faint, huge
            const ghostWord = label.split(' ')[0];
            const ghostSize = h * 0.68;
            ctx.font = `700 ${ghostSize}px Rajdhani`;
            ctx.textAlign = 'left';
            ctx.fillStyle = accent;
            ctx.globalAlpha = 0.035;
            ctx.fillText(ghostWord, w * 0.02, h * 0.82);
            ctx.globalAlpha = 1;
            ctx.textAlign = 'center';

            // Shared size for both lines — cap whichever word is wider
            const baseSize = h * 0.20;
            ctx.font = `700 ${baseSize}px Rajdhani`;
            const labelFit  = baseSize * Math.min(1, maxLabelW / ctx.measureText(label).width);
            const brandFit  = baseSize * Math.min(1, maxLabelW / ctx.measureText('DICEPTION').width);
            const sharedSize = Math.min(labelFit, brandFit);

            let labelSize = sharedSize;
            const labelLetterSpacing = Math.round(labelSize * 0.10);

            let brandSize = sharedSize;
            const brandLetterSpacing = Math.round(brandSize * 0.08);

            // Vertically center the two-line block (brand + label) as a unit
            const lineDiff = brandSize * 0.15 + labelSize * 0.87;
            const brandY = (h + brandSize * 0.72 - lineDiff - labelSize * 0.12) / 2;
            const labelY = brandY + lineDiff;

            ctx.shadowColor = accent;
            ctx.shadowBlur = labelSize * 0.30;
            ctx.fillStyle = accent;
            drawTextWithSpacing(ctx, label, titleCX, labelY, labelSize, 700, labelLetterSpacing, null);
            ctx.shadowBlur = 0;
            const charColors = 'DICEPTION'.split('').map((_, i) => i < 4 ? '#AA00FF' : '#00FFFF');
            ctx.shadowColor = '#AA00FF';
            ctx.shadowBlur = brandSize * 0.25;
            ctx.globalAlpha = 0.75;
            drawTextWithSpacing(ctx, 'DICEPTION', titleCX, brandY, brandSize, 700, brandLetterSpacing, charColors);
            ctx.shadowBlur = 0;
            ctx.globalAlpha = 1;

            // ── Top + bottom border lines ──
            const accentRGB = accent === '#00FFFF' ? '0,255,255'
                            : accent === '#55FF00' ? '85,255,0'
                            : accent === '#FFCC00' ? '255,204,0'
                            :                        '170,0,255';
            const borderGrad = ctx.createLinearGradient(0, 0, w, 0);
            borderGrad.addColorStop(0,    `rgba(${accentRGB},0)`);
            borderGrad.addColorStop(0.25, `rgba(${accentRGB},0.85)`);
            borderGrad.addColorStop(0.75, 'rgba(170,0,255,0.85)');
            borderGrad.addColorStop(1,    'rgba(170,0,255,0)');
            ctx.strokeStyle = borderGrad;
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(0, 1.5); ctx.lineTo(w, 1.5); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, h - 1.5); ctx.lineTo(w, h - 1.5); ctx.stroke();
        }

        // ── Downloads ──
        function downloadCanvas(canvasId, filename, asJpg) {
            const canvas = document.getElementById(canvasId);
            const link = document.createElement('a');
            link.download = filename;
            link.href = canvas.toDataURL(asJpg ? 'image/jpeg' : 'image/png', 0.95);
            link.click();
        }

        async function downloadAll() {
            const btn = document.querySelector('.download-all-btn');
            btn.textContent = '⏳ Zipping...';
            btn.disabled = true;

            const zip = new JSZip();
            const game = zip.folder('diception');
            const ost = zip.folder('soundtrack');

            const gameAssets = [...STORE_ASSETS, ...LIBRARY_ASSETS, ...WINDOWS_ASSETS, ...CUSTOM_ASSETS, ...BROADCAST_ASSETS, ...COMMUNITY_ASSETS];
            for (const asset of gameAssets) {
                const canvas = document.getElementById(asset.id);
                const blob = await new Promise(r => canvas.toBlob(r, 'image/png'));
                game.file(`${asset.id}_${asset.w}x${asset.h}.png`, blob);
            }
            for (const asset of SOUNDTRACK_ASSETS) {
                const canvas = document.getElementById(asset.id);
                const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.95));
                ost.file(`${asset.id}_${asset.w}x${asset.h}.jpg`, blob);
            }

            const content = await zip.generateAsync({ type: 'blob' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(content);
            link.download = 'diception_steam_assets.zip';
            link.click();
            URL.revokeObjectURL(link.href);

            btn.textContent = '⬇ Download All';
            btn.disabled = false;
        }
    </script>
