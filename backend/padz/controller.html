<html>

<head>
    <link rel="apple-touch-icon" sizes="180x180" href="../gfx/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="../gfx/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../gfx/favicon-16x16.png">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="manifest" href="site.webmanifest">

    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-status-bar-style" content="black" />
    <meta name="description" content="">
    <meta name="author" content="Alexander Thurn, Torsten Stelljes">
    <meta name="application-name" content="FW Remote" />
    <meta name="mobile-web-app-title" content="FW Remote" />
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            margin: 0;
            padding: 0;
        }

        canvas {
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            user-select: none;
            touch-action: none;
            pointer-events: auto;
        }

        #canvasCamera {
            width: 100%;
            max-width: 280px;
            height: auto;
            max-height: 220px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            display: block;
            margin: 12px auto 0;
        }

        /* ── Dialog shell ── */
        #settingsDialog {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            max-width: 100%;
            max-height: 100%;
            border: none;
            border-radius: 0;
            margin: 0;
            padding: 0;
            background-color: transparent;
            overflow: hidden;
        }

        #settingsDialog[open] {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #settingsDialog::backdrop {
            display: none;
        }

        /* ── Inner card ── */
        .dialog-card {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 100%;
            max-height: 100%;
            background: #000;
            border: none;
            border-radius: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Scrollable body ── */
        .dialog-body {
            flex: 1;
            overflow-y: auto;
            padding: 28px 24px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.2) transparent;
        }

        /* ── Close button ── */
        #btnClose {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: background 0.15s, color 0.15s;
            padding: 0;
            margin: 0;
            max-width: none;
            width: 32px;
            line-height: 1;
        }

        #btnClose:hover {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
        }

        /* ── Section titles ── */
        .section-label {
            font-family: 'Courier New', monospace;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.35);
            margin-bottom: 8px;
        }

        /* ── Connect section ── */
        .connect-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
            text-align: center;
        }

        .connect-title {
            font-family: 'Courier New', monospace;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 0.08em;
            color: #fff;
            margin-bottom: 4px;
        }

        .connect-subtitle {
            font-family: 'Courier New', monospace;
            font-size: 11px;
            letter-spacing: 0.15em;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        #inputServerId {
            width: 100%;
            max-width: none;
            height: 48px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 8px;
            color: #fff;
            font-family: 'Courier New', monospace;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-align: center;
            outline: none;
            transition: border-color 0.15s, background 0.15s;
            padding: 0 12px;
        }

        #inputServerId:focus {
            border-color: rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.11);
        }

        #inputServerId::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }

        #btnAccept {
            width: 100%;
            max-width: none;
            height: 44px;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            border-radius: 8px;
            color: #000;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
            padding: 0;
            margin: 0;
            display: block;
        }

        #btnAccept:active {
            transform: scale(0.98);
            background: rgba(255, 255, 255, 0.75);
        }

        /* ── Divider ── */
        .divider {
            display: flex;
            align-items: center;
            gap: 10px;
            color: rgba(255, 255, 255, 0.2);
            font-family: 'Courier New', monospace;
            font-size: 10px;
            letter-spacing: 0.2em;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
        }

        #btnScan {
            width: 100%;
            max-width: none;
            height: 44px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: rgba(255, 255, 255, 0.7);
            font-family: 'Courier New', monospace;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            cursor: pointer;
            transition: border-color 0.15s, color 0.15s, background 0.15s;
            padding: 0;
            margin: 0;
            display: block;
        }

        #btnScan:hover {
            border-color: rgba(255, 255, 255, 0.4);
            color: #fff;
            background: rgba(255, 255, 255, 0.05);
        }

        #loadingMessage {
            font-family: 'Courier New', monospace;
            font-size: 11px;
            color: rgba(255, 100, 100, 0.8);
            text-align: center;
            padding: 6px 0;
        }

        /* ── Accordion ── */
        .accordion {
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
        }

        .accordion-toggle {
            width: 100%;
            max-width: none;
            height: 44px;
            background: rgba(255, 255, 255, 0.05);
            border: none;
            border-radius: 0;
            color: rgba(255, 255, 255, 0.6);
            font-family: 'Courier New', monospace;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            margin: 0;
            transition: background 0.15s, color 0.15s;
        }

        .accordion-toggle:hover {
            background: rgba(255, 255, 255, 0.09);
            color: #fff;
        }

        .accordion-toggle .chevron {
            font-size: 10px;
            transition: transform 0.25s;
            opacity: 0.5;
        }

        .accordion.open .accordion-toggle .chevron {
            transform: rotate(180deg);
        }

        .accordion-body {
            display: none;
            padding: 14px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(0, 0, 0, 0.3);
        }

        .accordion.open .accordion-body {
            display: block;
        }

        /* ── Layout chips ── */
        #layouts {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        #layouts .btn-small {
            flex: 1;
            min-width: 80px;
            height: 36px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 6px;
            color: rgba(255, 255, 255, 0.65);
            font-family: 'Courier New', monospace;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.15s;
            padding: 0;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            width: auto;
            max-width: none;
        }

        #layouts .btn-small:hover {
            background: rgba(255, 255, 255, 0.14);
            color: #fff;
            border-color: rgba(255, 255, 255, 0.3);
        }

        #layouts .btn-small.selected {
            background: rgba(255, 255, 255, 0.9);
            color: #000;
            border-color: transparent;
        }

        /* ── Color swatches ── */
        #colors {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(36px, 1fr));
            gap: 6px;
        }

        #colors .btn-small {
            width: 100%;
            max-width: none;
            height: 36px;
            border-radius: 6px;
            border: 2px solid transparent;
            cursor: pointer;
            font-size: 0;
            padding: 0;
            margin: 0;
            transition: transform 0.12s, border-color 0.12s;
            display: block;
        }

        #colors .btn-small:hover {
            transform: scale(1.15);
            border-color: rgba(255, 255, 255, 0.6);
        }

        #colors .btn-small.selected {
            border-color: #fff;
            transform: scale(1.1);
            outline: 2px solid rgba(255, 255, 255, 0.3);
            outline-offset: 2px;
        }

        /* ── Footer ── */
        #dialog-footer {
            padding: 10px 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.07);
            font-family: 'Courier New', monospace;
            font-size: 10px;
            letter-spacing: 0.1em;
            color: rgba(255, 255, 255, 0.25);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        #dialog-footer a {
            color: rgba(255, 255, 255, 0.35);
            text-decoration: none;
        }

        #dialog-footer a:hover {
            color: rgba(255, 255, 255, 0.65);
        }

        /* ── Global button reset (don't affect overrides above) ── */
        button {
            font-family: inherit;
        }

        h1,
        h2 {
            display: none;
        }

        /* headings replaced by section-label */
    </style>
    <script src="./peerjs.min.js"></script>
    <script src="./pixi.js"></script>
    <script src="./jsQR.js"></script>
</head>

<body>
    <script type="text/javascript" src="./fwtouchcontrol.js"></script>
    <script type="text/javascript" src="./fwapplication.js"></script>
    <script type="text/javascript" src="./fwnetwork.js"></script>
    <script type="text/javascript" src="./fwnetworkgamepad.js"></script>
    <script type="text/javascript" src="./qr.js"></script>
    <script type="text/javascript" src="./controller.js"></script>

    <dialog id="settingsDialog">
        <div class="dialog-card">
            <button id="btnClose" onclick="document.getElementById('settingsDialog').close()">X</button>

            <div class="dialog-body">

                <!-- Connect section -->
                <div class="connect-section">
                    <div class="connect-title">F-MOTE</div>
                    <div class="connect-subtitle">Enter room code</div>
                    <input type="text" id="inputServerId" placeholder="0000" />
                    <button id="btnAccept">Connect</button>
                </div>

                <div class="divider">or</div>

                <!-- QR scan -->
                <div style="display:flex; flex-direction:column; gap:8px;">
                    <button id="btnScan">Scan QR Code</button>
                    <canvas id="canvasCamera" hidden></canvas>
                    <div id="loadingMessage" hidden>Unable to access camera — please allow webcam access.</div>
                </div>

                <!-- Layout accordion -->
                <div class="accordion" id="accordionLayout">
                    <button class="accordion-toggle" onclick="toggleAccordion('accordionLayout')">
                        <span>Layout</span>
                        <span class="chevron">v</span>
                    </button>
                    <div class="accordion-body">
                        <div id="layouts">
                            <button class="btn-small" data-layout="full">Full</button>
                            <button class="btn-small" data-layout="simple">Simple</button>
                            <button class="btn-small" data-layout="dpad">D-Pad</button>
                            <button class="btn-small" data-layout="dpad-full">D-Pad Full</button>
                        </div>
                    </div>
                </div>

                <!-- Color accordion -->
                <div class="accordion" id="accordionColor">
                    <button class="accordion-toggle" onclick="toggleAccordion('accordionColor')">
                        <span>Color</span>
                        <span class="chevron">v</span>
                    </button>
                    <div class="accordion-body">
                        <div id="colors">
                            <button class="btn-small" data-color="ff0055" style="background:#ff0055"></button>
                            <button class="btn-small" data-color="ff3399" style="background:#ff3399"></button>
                            <button class="btn-small" data-color="cc00ff" style="background:#cc00ff"></button>
                            <button class="btn-small" data-color="6600ff" style="background:#6600ff"></button>
                            <button class="btn-small" data-color="0099ff" style="background:#0099ff"></button>
                            <button class="btn-small" data-color="00ffee" style="background:#00ffee"></button>
                            <button class="btn-small" data-color="00ff66" style="background:#00ff66"></button>
                            <button class="btn-small" data-color="ccff00" style="background:#ccff00"></button>
                            <button class="btn-small" data-color="ffcc00" style="background:#ffcc00"></button>
                            <button class="btn-small" data-color="ff6600" style="background:#ff6600"></button>

                            <button class="btn-small" data-color="ffc0cb" style="background:#ffc0cb"></button>
                            <button class="btn-small" data-color="ffd1dc" style="background:#ffd1dc"></button>
                            <button class="btn-small" data-color="e0bbff" style="background:#e0bbff"></button>
                            <button class="btn-small" data-color="b2f0e9" style="background:#b2f0e9"></button>
                            <button class="btn-small" data-color="c2f0c2" style="background:#c2f0c2"></button>
                            <button class="btn-small" data-color="fffac8" style="background:#fffac8"></button>
                            <button class="btn-small" data-color="ffe5b4" style="background:#ffe5b4"></button>
                            <button class="btn-small" data-color="e6ccb2" style="background:#e6ccb2"></button>

                            <button class="btn-small" data-color="a0522d" style="background:#a0522d"></button>
                            <button class="btn-small" data-color="8b4513" style="background:#8b4513"></button>
                            <button class="btn-small" data-color="d2b48c" style="background:#d2b48c"></button>
                            <button class="btn-small" data-color="deb887" style="background:#deb887"></button>
                            <button class="btn-small" data-color="b8860b" style="background:#b8860b"></button>
                            <button class="btn-small" data-color="556b2f" style="background:#556b2f"></button>
                            <button class="btn-small" data-color="6b4423" style="background:#6b4423"></button>
                            <button class="btn-small" data-color="c68642" style="background:#c68642"></button>

                            <button class="btn-small" data-color="f5f5f5" style="background:#f5f5f5"></button>
                            <button class="btn-small" data-color="cccccc" style="background:#cccccc"></button>
                            <button class="btn-small" data-color="999999" style="background:#999999"></button>
                            <button class="btn-small" data-color="333333" style="background:#333333"></button>
                        </div>
                    </div>
                </div>

            </div><!-- /dialog-body -->

            <div id="dialog-footer">
                <span>F-Mote 2.0.0 - Alexander Thurn</span>
                <a href="https://padz.feuerware.com">Reset</a>
            </div>

        </div><!-- /dialog-card -->
    </dialog>

    <div id="1cm" style="width: 1cm; position: absolute; visibility: hidden;"></div>

    <script>
        function toggleAccordion(id) {
            document.getElementById(id).classList.toggle('open');
        }
    </script>
</body>

</html>
