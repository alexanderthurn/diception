name: Tauri Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:

  # ─── Mac ──────────────────────────────────────────────────────────────────────
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Fetch Steam SDK
        run: |
          mkdir -p src-tauri/resources
          curl -fsSL "${{ secrets.STEAM_SDK_ZIP_URL }}" -o steam_sdk.zip
          unzip -o steam_sdk.zip -d steam_sdk_tmp
          find steam_sdk_tmp -path "*/osx/libsteam_api.dylib" -exec cp {} src-tauri/resources/libsteam_api.dylib \;

      - run: npm ci

      - run: npm run tauri:build:mac

      - uses: actions/upload-artifact@v4
        with:
          name: mac
          path: dist-tauri/mac/

  # ─── Windows ──────────────────────────────────────────────────────────────────
  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Fetch Steam SDK
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri/resources | Out-Null
          Invoke-WebRequest -Uri "${{ secrets.STEAM_SDK_ZIP_URL }}" -OutFile steam_sdk.zip
          Expand-Archive -Path steam_sdk.zip -DestinationPath steam_sdk_tmp -Force
          Get-ChildItem -Recurse steam_sdk_tmp -Filter steam_api64.dll | Where-Object { $_.Directory.Name -eq 'win64' } | Copy-Item -Destination src-tauri/resources/steam_api64.dll

      - run: npm ci

      - run: npm run tauri:build:win

      - uses: actions/upload-artifact@v4
        with:
          name: win
          path: dist-tauri/win/

  # ─── Linux / Steam Deck ───────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Fetch Steam SDK
        run: |
          mkdir -p src-tauri/resources
          curl -fsSL "${{ secrets.STEAM_SDK_ZIP_URL }}" -o steam_sdk.zip
          unzip -o steam_sdk.zip -d steam_sdk_tmp
          find steam_sdk_tmp -path "*/linux64/libsteam_api.so" -exec cp {} src-tauri/resources/libsteam_api.so \;

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libudev-dev

      - run: npm ci

      - run: npm run tauri:build:linux

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: dist-tauri/linux/

  # ─── Android ──────────────────────────────────────────────────────────────────
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK 25
        run: sdkmanager "ndk;25.2.9519653"

      - run: npm ci

      - name: Init Android project
        run: npm run android:init

      - name: Build Android
        run: npm run tauri:build:android
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/25.2.9519653

      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: dist-tauri/android/DICEPTION.apk

  deploy-steam:
    needs: [build-mac, build-win, build-linux] 
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

 
      - uses: actions/download-artifact@v4
        with:
          path: steam-builds

    
      - name: Publish to Steam
        uses: game-ci/steam-deploy@v3
        with:
          username: ${{ secrets.STEAM_USERNAME }}
          # Das Secret aus Schritt 1
          configVdf: ${{ secrets.STEAM_CONFIG_VDF }}
          appId: ${{ secrets.STEAM_APP_ID }}
          buildDescription: "v${{ github.ref_name }} (GitHub Action)"
          
          # Hier legst du fest, welcher Branch bespielt wird
          releaseBranch:  ${{ secrets.STEAM_RELEASE_BRANCH }}
          depot1Path: "steam-builds/win"
          depot2Path: "steam-builds/mac"
          depot3Path: "steam-builds/linux"


      - name: Clean BuildOutput for demo deploy
        run: sudo rm -rf BuildOutput

      - name: Publish Demo to Steam
        uses: game-ci/steam-deploy@v3
        with:
          username: ${{ secrets.STEAM_USERNAME }}
          configVdf: ${{ secrets.STEAM_CONFIG_VDF }}
          appId: ${{ secrets.STEAM_DEMO_APP_ID }} # Hier muss das Secret für die Demo-ID hin!
          buildDescription: "v${{ github.ref_name }} (Demo via Shared Depots)"
          releaseBranch: ${{ secrets.STEAM_RELEASE_BRANCH }}
          # WICHTIG: Die Pfade bleiben gleich, da es dieselben Daten sind
          depot1Path: "steam-builds/win"
          depot2Path: "steam-builds/mac"
          depot3Path: "steam-builds/linux"