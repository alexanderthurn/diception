name: Tauri Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:

  # ─── Mac ──────────────────────────────────────────────────────────────────────
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Fetch Steam SDK
        run: |
          curl -fsSL "${{ secrets.STEAM_SDK_ZIP_URL }}" -o steam_sdk.zip
          unzip -o steam_sdk.zip -d steam_sdk_tmp
          cp steam_sdk_tmp/osx/libsteam_api.dylib src-tauri/resources/libsteam_api.dylib

      - run: npm ci

      - run: npm run tauri:build:mac

      - uses: actions/upload-artifact@v4
        with:
          name: mac
          path: dist-tauri/mac/

  # ─── Windows ──────────────────────────────────────────────────────────────────
  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Fetch Steam SDK
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "${{ secrets.STEAM_SDK_ZIP_URL }}" -OutFile steam_sdk.zip
          Expand-Archive -Path steam_sdk.zip -DestinationPath steam_sdk_tmp -Force
          Copy-Item steam_sdk_tmp/win64/steam_api64.dll src-tauri/resources/steam_api64.dll

      - run: npm ci

      - run: npm run tauri:build:win

      - uses: actions/upload-artifact@v4
        with:
          name: win
          path: dist-tauri/win/

  # ─── Linux / Steam Deck ───────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Fetch Steam SDK
        run: |
          curl -fsSL "${{ secrets.STEAM_SDK_ZIP_URL }}" -o steam_sdk.zip
          unzip -o steam_sdk.zip -d steam_sdk_tmp
          cp steam_sdk_tmp/linux64/libsteam_api.so src-tauri/resources/libsteam_api.so

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - run: npm ci

      - run: npm run tauri:build:linux

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: dist-tauri/linux/

  # ─── Android ──────────────────────────────────────────────────────────────────
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK 25
        run: sdkmanager "ndk;25.2.9519653"

      - run: npm ci

      - name: Build Android
        run: npm run tauri:build:android
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/25.2.9519653

      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: dist-tauri/android/DICEPTION.apk

  # ─── Web deploy (only when tag is on main) ────────────────────────────────────
  deploy-web:
    needs: [build-mac, build-win, build-linux, build-android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if tag is on main
        id: branch-check
        run: |
          git fetch origin main
          if git branch -r --contains ${{ github.sha }} | grep -q "origin/main"; then
            echo "on_main=true" >> $GITHUB_OUTPUT
          else
            echo "on_main=false" >> $GITHUB_OUTPUT
            echo "Tag is not on main — skipping FTP deploy."
          fi

      - uses: actions/setup-node@v4
        if: steps.branch-check.outputs.on_main == 'true'
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install & Build
        if: steps.branch-check.outputs.on_main == 'true'
        run: |
          npm ci
          npm run build

      - name: Deploy to FTP (Prod)
        if: steps.branch-check.outputs.on_main == 'true'
        run: |
          sudo apt-get update && sudo apt-get install -y lftp
          lftp -u "${{ secrets.FTP_USERNAME }}","${{ secrets.FTP_PASSWORD }}" "${{ secrets.FTP_SERVER }}" <<EOF
          set ftp:ssl-allow no
          set ftp:passive-mode true
          mkdir -p "/prod"
          mirror -R "./dist/" "/prod" \
            --delete \
            --parallel=10 \
            --exclude-glob .htaccess \
            --exclude-glob .htpasswd \
            --verbose
          quit
          EOF
