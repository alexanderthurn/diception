name: FTP Sync (Deploy & Cleanup)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - '**'
    tags-ignore:
      - '**'
  delete:
  workflow_dispatch:
    inputs:
      folder:
        description: 'Target folder on FTP server'
        required: true
        default: production
        type: string
  workflow_call:
    inputs:
      folder:
        required: true
        type: string

jobs:
  # JOB 1: DEPLOY (runs on every push)
  deploy:
    if: github.event_name == 'push' || github.event_name == 'workflow_call' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install & Build
        run: |
          npm ci
          npm run build

      - name: Set target folder
        id: target
        run: echo "folder=${{ inputs.folder || github.ref_name }}" >> $GITHUB_OUTPUT

      - name: Deploy to FTP
        run: |
          sudo apt-get update && sudo apt-get install -y lftp

          lftp -u "${{ secrets.FTP_USERNAME }}","${{ secrets.FTP_PASSWORD }}" "${{ secrets.FTP_SERVER }}" <<EOF
          set ftp:ssl-allow no
          set ftp:passive-mode true
          set net:timeout 30
          set net:max-retries 3
          mkdir -p "/${{ steps.target.outputs.folder }}"

          # Mirror with protection for sensitive server files
          mirror -R "./dist/" "/${{ steps.target.outputs.folder }}" \
            --delete \
            --parallel=10 \
            --exclude-glob .htaccess \
            --exclude-glob .htpasswd \
            --exclude-glob "stats/" \
            --verbose
          quit
          EOF

  # JOB 2: CLEANUP (runs when a branch is deleted)
  cleanup:
    if: |
      github.event_name == 'delete' && 
      github.event.ref_type == 'branch' && 
      github.event.ref != 'main' && 
      github.event.ref != 'master'
    
    runs-on: ubuntu-latest
    steps:
      - name: Remove Folder from FTP
        run: |
          sudo apt-get update && sudo apt-get install -y lftp
          
          lftp -u "${{ secrets.FTP_USERNAME }}","${{ secrets.FTP_PASSWORD }}" "${{ secrets.FTP_SERVER }}" <<EOF
          set ftp:ssl-allow no
          set ftp:passive-mode true
          # Recursively deletes the branch folder
          rm -rf "/${{ github.event.ref }}"
          quit
          EOF